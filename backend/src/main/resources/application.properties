spring.application.name=fleet-backend
server.port=8080

# Datasource (overridable via env vars from docker-compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fleetdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fleet}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fleet}

# JPA / Hibernate manages the schema; data.sql seeds example rows after creation
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Run data.sql on startup, after Hibernate has created the tables (idempotent via ON CONFLICT)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
