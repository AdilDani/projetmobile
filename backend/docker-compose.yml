services:
  db:
    image: postgres:16
    container_name: fleet-db
    environment:
      POSTGRES_DB: fleetdb
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleetdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: fleet-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/fleetdb
      SPRING_DATASOURCE_USERNAME: fleet
      SPRING_DATASOURCE_PASSWORD: fleet
    ports:
      - "8080:8080"

volumes:
  pgdata:
